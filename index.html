<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Straight Outta Naples</title>
    <!-- Display serif: Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
    <!-- Body sans-serif: Satoshi -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // Decode the path encoded by public/404.html and restore it via history API
      // so React Router receives the correct URL without a server round-trip.
      (function (l) {
        if (l.search[1] === 'p') {
          var params = l.search.slice(1).split('&').reduce(function (o, s) {
            var i = s.indexOf('=');
            o[decodeURIComponent(s.slice(0, i))] = s.slice(i + 1).replace(/~and~/g, '&');
            return o;
          }, {});
          window.history.replaceState(
            null, null,
            '/' + params.p.replace(/~and~/g, '&') +
            (params.q ? '?' + params.q.replace(/~and~/g, '&') : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
